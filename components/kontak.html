<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <!-- <link rel="stylesheet" href="/src/styles/responsive.css"> -->
    <title>Document</title>
</head>
<style>
    @font-face {
        font-family: Northern Demo Version;
        src: url('/font/Northern\ Demo\ Version.otf') format('truetype');
    }

    @font-face {
        font-family: Delich FREE;
        src: url('/font/Delich\ FREE.otf') format('truetype');
    }

    @font-face {
        font-family: Nathan TTF;
        src: url('/font/Nathan\ TTF.ttf') format('truetype');
    }

    body {
        max-width: 100%;
        overflow-x: hidden;
        font-family: Nathan TTF;
    }

    .nav_blockA {
        background: rgb(238, 248, 246);
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        text-align: center;
        height: 80px;
        justify-content: space-around;
    }

    .nav_blockA a {
        display: inline-block;
        text-decoration: none;
        align-self: center;
        color: black;

    }

    .nav_blockA i {
        font-size: 20px;
        padding: 5px 25px 5px 25px;
        border-radius: 18px;
    }

    .nav_blockA .active {
        background: rgba(0, 162, 255, 0.356);
    }

    .nav_blockA sub {
        font-family: sans-serif;
    }

    .container1 {
        width: 100%;
        height: 100vh;
        padding: 15px;
        box-sizing: border-box;
        margin: 0;
    }

    .subcontainer1_blockA {
        margin-top: 100px;
        width: 100%;
    }

    .subsubcontainer1_blockB {
        display: grid;
        box-sizing: border-box;
        width: 100%;
        margin-top: 100px;
    }

    .subsubcontainer1_blockB form {
        display: grid;
        gap: 20px;
    }

    .subsubcontainer1_blockB input {
        border: none;
        border-bottom: 1px solid black;
        height: 40px;
        width: 100%;
        background: transparent;
        outline: none;
        font-family: Nathan TTF;

    }

    .subsubcontainer1_blockB textarea {
        border: none;
        border-bottom: 1px solid black;
        height: 100px;
        width: 100%;
        outline: none;
        background: transparent;
        font-family: Nathan TTF;

    }

    .subsubcontainer1_blockB .input {
        width: 100px;
        outline: none;
        height: 40px;
        border: none;
        background: black;
        color: white;
        font-weight: bold;
        border-radius: 20px;
        justify-self: end;
        font-family: Nathan TTF;
    }
</style>

<body>
    <div class="container1">
        <nav class="nav_blockA">
            <a href="/index.html"><i class="fa-solid fa-user "></i><br><sub>profil</sub></a>
            <a href="projek.html"><i class="fa-solid fa-code"></i><br><sub>projek</sub></a>
            <a href="stack.html"><i class="fa-solid fa-cubes-stacked"></i><br><sub>stack</sub></a>
            <a href="kontak.html"><i class="fa-solid fa-phone active"></i><br><sub>kontak</sub></a>
        </nav>
        <div class="subcontainer1_blockA">
            <div class="subsubcontainer1_blockA">
                <h1>Hubungi Saya</h1>
            </div>
        </div>
        <div class="subsubcontainer1_blockB">
            <form action="https://formspree.io/f/mjvqajzv" method="POST">
                <input type="text" name="name" placeholder="Nama" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="Message" cols="30" rows="10" placeholder="Pesan atau Saran" required></textarea>
                <input class="input" type="submit" value="Kirim">
            </form>
        </div>
    </div>
</body>

</html>
