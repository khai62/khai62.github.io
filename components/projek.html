    <title>Document</title>

<style>
    @font-face {
        font-family: Northern Demo Version;
        src: url('/font/Northern\ Demo\ Version.otf') format('truetype');
    }

    @font-face {
        font-family: Delich FREE;
        src: url('/font/Delich\ FREE.otf') format('truetype');
    }

    @font-face {
        font-family: Nathan TTF;
        src: url('/font/Nathan\ TTF.ttf') format('truetype');
    }

    body {
        max-width: 100%;
        overflow-x: hidden;
        font-family: Nathan TTF;
    }

    .nav_blockA {
        background: rgb(238, 248, 246);
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        text-align: center;
        height: 80px;
        justify-content: space-around;
    }

    .nav_blockA a {
        display: inline-block;
        text-decoration: none;
        align-self: center;
        color: black;

    }

    .nav_blockA i {
        font-size: 20px;
        padding: 5px 25px 5px 25px;
        border-radius: 18px;
    }

    .nav_blockA .active {
        background: rgba(0, 162, 255, 0.356);
    }

    .nav_blockA sub {
        font-family: sans-serif;
    }

    .subcontainer1 {
        width: 100%;
        height: 100vh;
        padding: 15px;
        box-sizing: border-box;
        margin: 0;
    }

    .subcontainer1_blockA {
        margin-top: 15px;
        box-sizing: border-box;
    }

    .subcontainer1_blockB {
        margin-top: 20px;
        display: flex;
        gap: 10px;
    }

    .subsubcontainer1_blockB {
        background: rgba(102, 100, 100, 0.288);
        display: flex;
        height: 40px;
        width: 100%;
        box-sizing: border-box;
        align-content: center;
        border-radius: 20px;
        padding-left: 20px;
        padding-right: 20px;

    }

    .subcontainer1_blockB input {
        border: none;
        outline: none;
        background: transparent;
        width: 100%;
    }

    .subcontainer1_blockB button {
        height: 40px;
        width: 40px;
        border-radius: 20px;
        border: none;
        background: black;
        color: white;
    }

    .subcontainer1_blockB button:hover {
        background: rgba(102, 100, 100, 0.288);
        color: black;
    }

    .subcontainer1_blockB i {
        font-size: 20px;
        margin-right: 5px;
        align-self: center;
    }

    .subcontainer1_blockC {
        margin-top: 20px;
    }

    .subcontainer1_blockD {
        display: flex;
        gap: 20px;
        overflow-x: auto;
        width: 100%;
        margin-top: 20px;
    }

    .subcontainer1_blockD a img {
        margin-top: 10px;
        flex: 0 0 auto;
        width: 200px;
        height: 300px;
        border-radius: 20px;
        margin-bottom: 10px;
        border: 1px solid black;
    }
</style>
