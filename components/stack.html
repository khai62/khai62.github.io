<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/src/styles/responsive.css">
    <title>Document</title>
</head>
<style>
    @font-face {
        font-family: Nathan TTF;
        src: url('/font/Nathan\ TTF.ttf') format('truetype');
    }

    @font-face {
        font-family: Northern Demo Version;
        src: url('/font/Northern\ Demo\ Version.otf') format('truetype');
    }

    @font-face {
        font-family: Delich FREE;
        src: url('/font/Delich\ FREE.otf') format('truetype');
    }

    body {
        max-width: 100%;
        overflow-x: hidden;
        font-family: Nathan TTF;
    }

    .nav_blockA {
        background: rgb(238, 248, 246);
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        text-align: center;
        height: 80px;
        justify-content: space-around;
    }

    .nav_blockA a {
        display: inline-block;
        text-decoration: none;
        align-self: center;
        color: black;

    }

    .nav_blockA i {
        font-size: 20px;
        padding: 5px 25px 5px 25px;
        border-radius: 18px;
    }

    .nav_blockA .active {
        background: rgba(0, 162, 255, 0.356);
    }

    .nav_blockA sub {
        font-family: sans-serif;
    }

    .container2 {
        padding: 10px;
        margin-top: 40px;
    }

    .container3 {
        box-sizing: border-box;
        margin-top: 70px;
        margin-left: 10px;
        margin-right: 10px;
        display: grid;
        grid-template-areas:
            'item1 item1 item1'
            'item2 pyramid-loader item3'
            'item4 pyramid-loader item5'
            'item6 item6 item6';
    }

    .item1 {
        grid-area: item1;
        justify-self: center;
        font-size: 20px;
        font-weight: bold;
    }

    .item2 {
        grid-area: item2;
        justify-self: center;
        font-size: 20px;
        font-weight: bold;
    }

    .item3 {
        grid-area: item3;
        justify-self: center;
        font-size: 20px;
        font-weight: bold;
    }

    .item4 {
        grid-area: item4;
        justify-self: center;
        font-size: 20px;
        font-weight: bold;
    }

    .item5 {
        grid-area: item5;
        justify-self: center;
        font-size: 20px;
        font-weight: bold;
    }

    .item6 {
        grid-area: item6;
        justify-self: center;
        font-size: 20px;
        font-weight: bold;
    }


    .pyramid-loader {
        grid-area: pyramid-loader;
        position: relative;
        width: 200px;
        height: 200px;
        display: grid;
        justify-self: center;
        justify-content: center;
        transform-style: preserve-3d;
        transform: rotateX(-20deg);
    }

    .wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        justify-items: center;
        transform-style: preserve-3d;
        animation: spin 4s linear infinite;
    }

    @keyframes spin {
        100% {
            transform: rotateY(360deg);
        }
    }

    .pyramid-loader .wrapper .side {
        width: 70px;
        height: 70px;
        /* you can choose any gradient or color you want */
        /* background: radial-gradient( #2F2585 10%, #F028FD 70%, #2BDEAC 120%); */
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        transform-origin: center top;
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .pyramid-loader .wrapper .side1 {
        transform: rotateZ(-30deg) rotateY(90deg);
        background: conic-gradient(#2BDEAC, #F028FD, #D8CCE6, #2F2585);
    }

    .pyramid-loader .wrapper .side2 {
        transform: rotateZ(30deg) rotateY(90deg);
        background: conic-gradient(#2F2585, #D8CCE6, #F028FD, #2BDEAC);
    }

    .pyramid-loader .wrapper .side3 {
        transform: rotateX(30deg);
        background: conic-gradient(#2F2585, #D8CCE6, #F028FD, #2BDEAC);
    }

    .pyramid-loader .wrapper .side4 {
        transform: rotateX(-30deg);
        background: conic-gradient(#2BDEAC, #F028FD, #D8CCE6, #2F2585);
    }

    .pyramid-loader .wrapper .shadow {
        width: 60px;
        height: 60px;
        background: #8B5AD5;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        transform: rotateX(90deg) translateZ(-40px);
        filter: blur(12px);
    }
</style>

<body>
    <div class="container1">
        <nav class="nav_blockA">
            <a href="/index.html"><i class="fa-solid fa-user "></i><br><sub>profil</sub></a>
            <a href="projek.html"><i class="fa-solid fa-code"></i><br><sub>projek</sub></a>
            <a href="stack.html"><i class="fa-solid fa-cubes-stacked active"></i><br><sub>stack</sub></a>
            <a href="kontak.html"><i class="fa-solid fa-phone"></i><br><sub>kontak</sub></a>
        </nav>

        <div class="container2">
            <h2>Kumpulan Teknologi</h2>
            <p>kumpulan teknologi pengembangan Android</p>
        </div>
        <div class="container3">
            <div class="item1">
                <p>JavaScript</p>
            </div>
            <div class="pyramid-loader">
                <div class="wrapper">
                    <span class="side side1"></span>
                    <span class="side side2"></span>
                    <span class="side side3"></span>
                    <span class="side side4"></span>
                    <span class="shadow"></span>
                </div>
            </div>
            <div class="item2">
                <p>React Native</p>
            </div>
            <div class="item3">
                <p>MongoDB</p>
            </div>
            <div class="item4">
                <p>Node js</p>
            </div>
            <div class="item5">
                <p>Express js</p>
            </div>
            <div class="item6">
                <p>Git</p>
            </div>

        </div>

    </div>
</body>

</html>
